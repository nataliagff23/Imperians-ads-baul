    function recordToAd(record) {
      var f = record.fields;
      var attachment = f["Media"] && f["Media"].length > 0 ? f["Media"][0] : null;
      var mediaUrl = attachment ? attachment.url : "";
      var mediaName = attachment ? attachment.filename : "";
      var mediaType = attachment ? (attachment.type && attachment.type.startsWith("video/") ? "video" : "image") : "";
      return {
        id: f.ID || record.id,
        airtableId: record.id,
        client: f["Cliente"] || "",
        campaignName: f["Campaña"] || "",
        platform: f["Plataforma"] || "",
        adFormat: f["Formato"] || "",
        headline: f["Headline"] || "",
        primaryText: f["Copy"] || "",
        cta: f["CTA"] || "",

        status: f["Estado"] || "testing",
        date: f["Fecha"] || "",
        team: f["Equipo"] || "",
        notes: f["Notas"] || "",
        mediaData: mediaUrl,
        mediaType: mediaType,
        mediaName: mediaName,
      };
    }

    function adToFields(ad) {

        "Cliente": ad.client,

    async function uploadMediaToAirtable(airtableRecordId, mediaData, mediaName, mediaType) {
      if (!mediaData || !airtableRecordId) return;
      if (mediaData.startsWith("http")) return;
      try {
        var base64 = mediaData.split(",")[1];
        var mimeType = mediaType === "video" ? "video/mp4" : "image/jpeg";
        if (mediaName) {
          var ext = mediaName.split(".").pop().toLowerCase();
          var mimeMap = { jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png", gif: "image/gif", webp: "image/webp", mp4: "video/mp4", mov: "video/quicktime", avi: "video/x-msvideo" };
          if (mimeMap[ext]) mimeType = mimeMap[ext];
        }
        await fetch(AT_CONTENT_URL + "/" + airtableRecordId + "/" + MEDIA_FIELD_ID + "/uploadAttachment", {
          method: "POST",
          headers: { "Authorization": "Bearer " + AT_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ contentType: mimeType, filename: mediaName || "media", file: base64 })
        });
      } catch (e) {
        console.error("Error subiendo media a Airtable:", e);
      }
    }

    function AdVault({ onLogout }) {
      const [ads, setAds] = useState(DEFAULT_DATA);

      const [searchQuery, setSearchQuery] = useState("");

      const [isLoading, setIsLoading] = useState(true);
      const [editingId, setEditingId] = useState(null);
      const fileInputRef = useRef(null);
      const [uploadError, setUploadError] = useState("");
      const [selectionMode, setSelectionMode] = useState(false);
      const [selectedIds, setSelectedIds] = useState([]);

      const toggleSelect = (id) => {
        setSelectedIds((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);
      };

      const exitSelectionMode = () => {
        setSelectionMode(false);
        setSelectedIds([]);
      };

      const handleMediaUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setUploadError("");

        const maxSize = 4 * 1024 * 1024;
        if (file.size > maxSize) {
          setUploadError("El archivo es muy grande. Máximo 4MB.");
          return;
        }

        const isImage = file.type.startsWith("image/");
        const isVideo = file.type.startsWith("video/");
        if (!isImage && !isVideo) {
          setUploadError("Solo se permiten imágenes y videos.");
          return;
        }

        const reader = new FileReader();
        reader.onload = (ev) => {
          setFormData((prev) => ({
            ...prev,
            mediaData: ev.target.result,
            mediaType: isVideo ? "video" : "image",
            mediaName: file.name,
          }));
        };
        reader.readAsDataURL(file);
      };

      const removeMedia = () => {
        setFormData((prev) => ({ ...prev, mediaData: "", mediaType: "", mediaName: "" }));
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      useEffect(() => {
        const loadData = async () => {
          try {
            const res = await fetch(AT_URL + "?pageSize=100", {
              headers: { "Authorization": "Bearer " + AT_KEY }
            });
            const data = await res.json();
            if (data.records && data.records.length > 0) {
              setAds(data.records.map(recordToAd));
            } else {
              setAds([]);
            }
          } catch (e) {
            console.log("Error cargando desde Airtable:", e);
            setAds([]);
          }
          setIsLoading(false);
        };
        loadData();
      }, []);

      const clients = [...new Set(ads.map((a) => a.client))].sort();

      const filteredAds = ads
        .filter((a) => filterClient === "all" || a.client === filterClient)
        .filter((a) => filterStatus === "all" || a.status === filterStatus)
        .filter((a) => filterPlatform === "all" || a.platform === filterPlatform)
        .filter((a) => filterTeam === "all" || a.team === filterTeam)
        .filter((a) => {
          if (!searchQuery) return true;
          const q = searchQuery.toLowerCase();
          return a.client.toLowerCase().includes(q) || a.campaignName.toLowerCase().includes(q) || a.headline.toLowerCase().includes(q) || a.primaryText.toLowerCase().includes(q);
        })
        .sort((a, b) => {
          if (sortBy === "date") return new Date(b.date) - new Date(a.date);
          if (sortBy === "roas") return b.roas - a.roas;
          if (sortBy === "ctr") return b.ctr - a.ctr;
          if (sortBy === "spend") return b.spend - a.spend;
          return 0;
        });

      const handleSave = async () => {
        if (!formData.client || !formData.campaignName) return;
        try {
          if (editingId && formData.airtableId) {
            await fetch(AT_URL + "/" + formData.airtableId, {
              method: "PATCH",
              headers: { "Authorization": "Bearer " + AT_KEY, "Content-Type": "application/json" },
              body: JSON.stringify({ fields: adToFields(formData) })
            });
            if (formData.mediaData && !formData.mediaData.startsWith("http")) {
              await uploadMediaToAirtable(formData.airtableId, formData.mediaData, formData.mediaName, formData.mediaType);
              const refreshed = await fetch(AT_URL + "/" + formData.airtableId, { headers: { "Authorization": "Bearer " + AT_KEY } });
              const refreshedData = await refreshed.json();
              const updatedAd = recordToAd(refreshedData);
              setAds(ads.map((a) => a.id === editingId ? updatedAd : a));
            } else {
              setAds(ads.map((a) => a.id === editingId ? { ...formData, id: editingId } : a));
            }
          } else {
            const newId = Date.now().toString();
            const newAd = { ...formData, id: newId };
            const res = await fetch(AT_URL, {
              method: "POST",
              headers: { "Authorization": "Bearer " + AT_KEY, "Content-Type": "application/json" },
              body: JSON.stringify({ fields: adToFields(newAd) })
            });
            const data = await res.json();
            if (newAd.mediaData) {
              await uploadMediaToAirtable(data.id, newAd.mediaData, newAd.mediaName, newAd.mediaType);
              const refreshed = await fetch(AT_URL + "/" + data.id, { headers: { "Authorization": "Bearer " + AT_KEY } });
              const refreshedData = await refreshed.json();
              const createdAd = recordToAd(refreshedData);
              setAds([...ads, createdAd]);
            } else {
              setAds([...ads, { ...newAd, airtableId: data.id }]);
            }
          }
        } catch (e) {
          console.error("Error guardando en Airtable:", e);
        }
        setShowForm(false);
        setEditingId(null);
        setFormData({ ...emptyAd });
      };

      const handleEdit = (ad) => {

        setShowForm(true);
        setSelectedAd(null);
      };

      const handleDelete = async (id) => {
        const ad = ads.find((a) => a.id === id);
        if (!ad) return;
        try {
          if (ad.airtableId) {
            await fetch(AT_URL + "/" + ad.airtableId, {
              method: "DELETE",
              headers: { "Authorization": "Bearer " + AT_KEY }
            });

          setAds(ads.filter((a) => a.id !== id));
        } catch (e) {
          console.error("Error eliminando de Airtable:", e);

        setSelectedAd(null);
      };

      const handleExport = (idsToExport) => {
        var exportList = idsToExport && idsToExport.length > 0
          ? ads.filter((a) => idsToExport.includes(a.id))
          : filteredAds;
        if (exportList.length === 0) return;
        var filteredAds = exportList;
        const clientName = filterClient === "all" ? "Todos los clientes" : filterClient;
        const today = new Date().toLocaleDateString("es-MX", { year: "numeric", month: "long", day: "numeric" });
        const logoSrc = document.querySelector('img[alt="Imperians Agency"]') ? document.querySelector('img[alt="Imperians Agency"]').src : "";

        function buildAdCard(ad) {
          var html = '<div class="ad-card">';
          if (ad.mediaData) {
            html += '<div class="ad-media">';
            if (ad.mediaType === "video") {
              html += '<video src="' + ad.mediaData + '" controls></video>';
            } else {
              html += '<img src="' + ad.mediaData + '" alt="" />';
            }
            html += '</div>';
          }
          html += '<div class="ad-body">';
          html += '<div class="ad-top">';
          html += '<span class="badge badge-platform">' + ad.platform + ' · ' + ad.adFormat + '</span>';
          var statusLabel = ad.status === "winner" ? "🏆 Winner" : ad.status === "testing" ? "🧪 Testing" : "⏸ Paused";
          html += '<span class="badge badge-' + ad.status + '">' + statusLabel + '</span>';
          if (ad.team && TEAMS[ad.team]) {
            html += '<span class="badge badge-team">' + TEAMS[ad.team].icon + ' ' + TEAMS[ad.team].name + '</span>';
          }
          html += '<span class="ad-date">' + ad.date + '</span>';
          html += '</div>';
          html += '<div class="ad-campaign">' + ad.campaignName + '</div>';
          if (ad.headline) html += '<div class="ad-headline">' + ad.headline + '</div>';
          if (ad.primaryText) html += '<div class="ad-copy">' + ad.primaryText + '</div>';
          if (ad.cta) html += '<span class="ad-cta">' + ad.cta + ' \u2192</span>';
          if (ad.audience) {
            html += '<div class="section-label" style="margin-top:4px">\uD83C\uDFAF Segmentaci\u00f3n</div>';
            html += '<div class="ad-audience">' + ad.audience + '</div>';
          }
          if (ad.notes) {
            html += '<div class="section-label">\uD83D\uDCA1 Notas y Aprendizajes</div>';
            html += '<div class="ad-notes">' + ad.notes + '</div>';
          }
          html += '</div></div>';
          return html;
        }

        var adsHTML = filteredAds.map(buildAdCard).join("");
        var logoHTML = logoSrc

                      background: "rgba(99,102,241,0.03)",
                    }}
                      onMouseEnter={(e) => { e.currentTarget.style.borderColor = "rgba(99,102,241,0.6)"; e.currentTarget.style.background = "rgba(99,102,241,0.06)"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.borderColor = "rgba(99,102,241,0.3)"; e.currentTarget.style.background = "rgba(99,102,241,0.03)"; }}>
                      <div style={{ fontSize: "36px", marginBottom: "8px" }}>📁</div>
                      <div style={{ fontSize: "14px", color: "#818cf8", fontWeight: 600, marginBottom: "4px" }}>Haz clic para subir</div>
                      <div style={{ fontSize: "12px", color: "#475569" }}>Imagen o video · Máx 4MB</div>
                    </div>
                  ) : (
                    <div style={{ position: "relative", borderRadius: "16px", overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)" }}>
                      {formData.mediaType === "video" ? (
                        <video src={formData.mediaData} controls style={{ width: "100%", display: "block", maxHeight: "250px", objectFit: "contain", background: "#000", borderRadius: "14px" }} />
                      ) : (
                        <img src={formData.mediaData} alt="Preview" style={{ width: "100%", display: "block", maxHeight: "250px", objectFit: "contain", background: "#000", borderRadius: "14px" }} />
                      )}
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "rgba(0,0,0,0.5)" }}>
                        <span style={{ fontSize: "12px", color: "#94a3b8" }}>{formData.mediaName}</span>
                        <div style={{ display: "flex", gap: "8px" }}>
                          <button onClick={(e) => { e.stopPropagation(); fileInputRef.current?.click(); }} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#e2e8f0", borderRadius: "8px", padding: "6px 12px", fontSize: "12px", cursor: "pointer" }}>Cambiar</button>
                          <button onClick={(e) => { e.stopPropagation(); removeMedia(); }} style={{ background: "rgba(239,68,68,0.2)", border: "none", color: "#ef4444", borderRadius: "8px", padding: "6px 12px", fontSize: "12px", cursor: "pointer" }}>Eliminar</button>
                        </div>
                      </div>
                    </div>
                  )}
                  {uploadError && <div style={{ color: "#ef4444", fontSize: "12px", marginTop: "8px" }}>{uploadError}</div>}
                </div>

                <div style={{ marginBottom: "24px" }}>
                  <label style={labelStyle}>💡 Notas / Aprendizajes</label>
                  <textarea value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} placeholder="¿Qué funcionó? ¿Qué aprendiste? Hooks, creatividades, insights..." rows={3} style={{ ...inputStyle, resize: "vertical" }} />
                </div>

                <div style={{ display: "flex", gap: "12px", justifyContent: "flex-end" }}>
                  <button onClick={() => { setShowForm(false); setEditingId(null); }} style={btnGhost}>Cancelar</button>
                  <button onClick={handleSave} style={{ ...btnPrimary, opacity: formData.client && formData.campaignName ? 1 : 0.5 }}>
                    {editingId ? "Guardar Cambios" : "Agregar a la Bóveda"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
